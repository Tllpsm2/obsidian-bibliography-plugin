name: CI

on:
    push:
        branches: ['**']
    pull_request:
        branches: ['**']

jobs:
    build:
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '24.x'
                  cache: 'npm'
            - run: npm ci
            - run: npm run build
            - run: npm run lint
